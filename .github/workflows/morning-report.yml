name: 🌅 Morning Report (08:00 KST)

on:
  schedule:
    - cron: '0 23 * * 0-4'   # 일~목 23:00 UTC = 월~금 08:00 KST
  workflow_dispatch:           # 수동 실행 버튼

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests yfinance pytz

      - name: Morning Report 전송
        run: python telegram_report.py morning
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT:  ${{ secrets.TG_CHAT }}
